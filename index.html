<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOS Nieuws - Radio Unique</title>

<style>

body{
    margin:0;
    background:#f4f4f4;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:15px;
}

h1{
    color:#c60000;
    margin-bottom:25px;
    font-size:36px;
}

.artikel{
    display:flex;
    gap:20px;
    background:#ffffff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.12);
    margin-bottom:22px;
}

.artikel img{
    width:240px;
    height:150px;
    object-fit:cover;
    flex-shrink:0;
}

.tekst{
    padding:18px;
    flex:1;
}

.tekst h2{
    margin:0 0 10px;
    font-size:23px;
}

.tekst h2 a{
    color:#111;
    text-decoration:none;
}

.tekst h2 a:hover{
    color:#c60000;
}

.datum{
    color:#888;
    font-size:14px;
    margin-bottom:12px;
}

.omschrijving{
    color:#444;
    line-height:1.6;
}

@media(max-width:700px){

.artikel{
    display:block;
}

.artikel img{
    width:100%;
    height:220px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>📰 NOS Nieuws</h1>

<div id="nieuws">
Nieuws laden...
</div>

</div>

<script src="script.js"></script>

</body>
</html>
