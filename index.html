<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOS Nieuws</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:#ffffff;
    font-family:Arial,Helvetica,sans-serif;
}

#news{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:10px;
}

/* Verberg de kop van het RSS-overzicht */
#news h1:first-child{
    display:none;
}

/* Mooie opmaak voor de artikelen */
#news article{
    margin-bottom:40px;
    padding-bottom:30px;
    border-bottom:1px solid #ddd;
}

#news img{
    max-width:100%;
    height:auto;
}

a{
    color:#005baa;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<div id="news">
Nieuws wordt geladen...
</div>

<script src="script.js"></script>

</body>
</html>
